<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Todo">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .todo-cal-wrap { padding: 16px 20px 0; max-width: 1100px; margin: 0 auto; }
    .todo-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .todo-cal-title { font-size: 22px; font-weight: 400; color: var(--text-primary); font-family: var(--font); }
    .todo-cal-title strong { font-weight: 700; }
    .todo-cal-navs { display: flex; gap: 8px; }
    .todo-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; }
    .todo-cal-dow { text-align: center; font-size: 11px; font-weight: 500; color: var(--text-secondary); padding: 4px 0 8px; }
    .todo-cal-cell { display: flex; flex-direction: column; align-items: center; padding: 4px 2px 6px; cursor: pointer; border-radius: 12px; transition: background 0.1s; min-height: 50px; }
    .todo-cal-cell:hover { background: #f5f5f5; }
    .todo-cal-cell.empty { cursor: default; pointer-events: none; }
    .todo-cal-num { font-size: 13px; font-weight: 500; color: var(--text-primary); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .todo-cal-cell.is-today .todo-cal-num { background: var(--green); color: #fff; font-weight: 700; }
    .todo-cal-cell.is-selected:not(.is-today) .todo-cal-num { border: 2px solid var(--green); }
    .todo-cal-cell.all-done:not(.is-today) .todo-cal-num { background: var(--green-light); color: var(--green); }
    .todo-dot-wrap { display: flex; align-items: center; gap: 2px; margin-top: 3px; height: 8px; }
    .todo-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .todo-dot.plus { font-size: 8px; font-weight: 700; color: var(--green); background: none; width: auto; height: auto; border-radius: 0; line-height: 1; }

    .todo-list-wrap { padding: 20px 20px; max-width: 1100px; margin: 0 auto; }
    .todo-selected-date { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 16px; font-family: var(--font-mono); }
    .todo-category { margin-bottom: 20px; }
    .todo-cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .todo-cat-name { font-size: 14px; font-weight: 700; }
    .todo-cat-add { width: 26px; height: 26px; border-radius: 8px; border: 1px solid var(--border-default); background: var(--bg-card); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-secondary); transition: background 0.15s; }
    .todo-cat-add:hover { background: #f0f0f0; }
    .todo-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-top: 1px solid var(--border-default); }
    .todo-item:last-child { border-bottom: 1px solid var(--border-default); }
    .todo-item-check { width: 20px; height: 20px; min-width: 20px; border-radius: var(--radius-checkbox); border: 1.5px solid #D1D5DB; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 1px; background: transparent; transition: border-color 0.15s; flex-shrink: 0; overflow: visible; }
    .todo-item-check:hover { border-color: var(--green); }
    .todo-item-check.checked { border: none; }
    .todo-item-check .check-icon { display: none; line-height: 0; }
    .todo-item-check.checked .check-icon { display: block; }
    .todo-item-text-wrap { flex: 1; }
    .todo-item-text { font-size: 14px; font-weight: 500; color: var(--text-primary); line-height: 1.5; word-break: break-all; }
    .todo-item-text.done { text-decoration: line-through; color: var(--text-secondary); }
    .todo-item-due { font-size: 11px; color: var(--text-placeholder); margin-top: 2px; }
    .todo-item-due.overdue { color: #E57373; }
    .todo-item-delete { width: 20px; height: 20px; border: none; background: none; cursor: pointer; color: #D1D5DB; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: color 0.15s; }
    .todo-item-delete:hover { color: #E57373; }
    .todo-empty { font-size: 13px; color: var(--text-placeholder); padding: 8px 0; border-top: 1px solid var(--border-default); }
    .todo-modal-input { width: 100%; font-size: 14px; padding: 9px 12px; border: 1.5px solid var(--border-input); border-radius: var(--radius-input); outline: none; font-family: var(--font); margin-bottom: 10px; color: var(--text-primary); background: #fff; -webkit-appearance: none; appearance: none; }
    .todo-modal-input:focus { border-color: var(--green); }
    .todo-modal-input[type="date"] { height: 42px; line-height: 42px; padding: 0 12px; color: var(--text-secondary); }
    .todo-modal-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }

    @media (min-width: 768px) {
      .todo-cal-wrap { padding: 20px 24px 0; }
      .todo-list-wrap { padding: 20px 24px; }
    }
  </style>
</head>
<body>

  <div class="float-header">
    <div class="header-inner">
      <button class="btn-today" onclick="goToTodayTodo()">Today</button>
      <div class="header-right">
        <button class="icon-btn" onclick="openCatSettings()">⚙️</button>
      </div>
    </div>
  </div>

  <div class="todo-cal-wrap">
    <div class="todo-cal-header">
      <div class="todo-cal-title" id="todo-cal-title"></div>
      <div class="todo-cal-navs">
        <button class="nav-btn" onclick="changeTodoMonth(-1)">&#8249;</button>
        <button class="nav-btn" onclick="changeTodoMonth(1)">&#8250;</button>
      </div>
    </div>
    <div class="todo-cal-grid" id="todo-cal-grid"></div>
  </div>

  <div class="todo-list-wrap">
    <div class="todo-selected-date" id="todo-selected-date"></div>
    <div id="todo-cat-list"></div>
  </div>

  <!-- Category Settings Modal -->
  <div class="modal-overlay" id="cat-settings-modal" onclick="if(event.target===this)closeCatSettings()">
    <div class="modal-sheet" style="max-height:80vh;overflow-y:auto;">
      <div class="cal-header">
        <span style="font-size:14px;font-weight:600;">카테고리 관리</span>
        <button class="modal-close" onclick="closeCatSettings()">&#x2715;</button>
      </div>
      <div id="cat-list-settings"></div>
      <button class="tag-action-btn add" onclick="openAddCat()" style="width:100%;margin-top:12px;">+ 카테고리 추가</button>
      <div id="cat-form" style="display:none;margin-top:16px;border-top:1px solid #ebebeb;padding-top:16px;">
        <p id="cat-form-title" style="font-size:13px;font-weight:600;margin-bottom:10px;"></p>
        <input id="cat-name-input" type="text" placeholder="카테고리 이름" maxlength="16" class="todo-modal-input">
        <input type="hidden" id="cat-edit-id">
        <p class="todo-modal-label">색상 선택</p>
        <div id="cat-color-palette" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;"></div>
        <input type="hidden" id="cat-selected-color">
        <div style="display:flex;gap:8px;">
          <button class="tag-action-btn" onclick="document.getElementById('cat-form').style.display='none'" style="flex:1;">취소</button>
          <button class="tag-action-btn add" onclick="saveCat()" style="flex:1;">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Todo Modal -->
  <div class="modal-overlay" id="add-todo-modal" onclick="if(event.target===this)closeAddTodo()">
    <div class="modal-sheet">
      <div class="cal-header">
        <span style="font-size:14px;font-weight:600;">할 일 추가</span>
        <button class="modal-close" onclick="closeAddTodo()">&#x2715;</button>
      </div>
      <p class="todo-modal-label">할 일</p>
      <input id="todo-text-input" type="text" placeholder="내용을 입력해주세요" class="todo-modal-input">
      <p class="todo-modal-label">마감일 (선택)</p>
      <input id="todo-due-input" type="date" class="todo-modal-input" style="color:var(--text-secondary)">
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="tag-action-btn" onclick="closeAddTodo()" style="flex:1;">취소</button>
        <button class="tag-action-btn add" onclick="saveTodoItem()" style="flex:1;">추가</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="index.html" class="bottom-nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span>Goals</span>
      </a>
      <a href="todo.html" class="bottom-nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><polyline points="4 6 5 7 7 5"/><polyline points="4 12 5 13 7 11"/><polyline points="4 18 5 19 7 17"/></svg>
        <span>Todo</span>
      </a>
      <a href="my.html" class="bottom-nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span>My</span>
      </a>
    </div>
  </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCUaccqKI5TwoNG5YQ0Dd0DYIjqH62lcOI",
      authDomain: "todo-454be.firebaseapp.com",
      projectId: "todo-454be",
      storageBucket: "todo-454be.firebasestorage.app",
      messagingSenderId: "210182337293",
      appId: "1:210182337293:web:5ce96ca03dc9c781237644"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const CHECK_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="0.75" y="0.75" width="18.5" height="18.5" rx="5.25" stroke="#93BB89" stroke-width="1.5"/>
      <g transform="translate(0.5, 0.5)">
        <path d="M7.40894 5.72401C7.85539 3.42533 11.1446 3.42533 11.5911 5.72401C11.7567 6.57664 12.4234 7.24334 13.276 7.40894C15.5747 7.85539 15.5747 11.1446 13.276 11.5911C12.4234 11.7567 11.7567 12.4234 11.5911 13.276C11.1446 15.5747 7.85539 15.5747 7.40894 13.276C7.24334 12.4234 6.57664 11.7567 5.72401 11.5911C3.42533 11.1446 3.42533 7.85539 5.72401 7.40894C6.57664 7.24334 7.24334 6.57664 7.40894 5.72401Z" fill="#93BB89"/>
      </g>
    </svg>`;

    const CAT_PALETTE = ['#E57373','#FF8A65','#FFB300','#81C784','#4FC3F7','#7986CB','#BA68C8','#F06292','#4DB6AC','#90A4AE'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    const today = new Date();
    function toStr(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    const todayStr = toStr(today);
    let calMonth = new Date(today.getFullYear(), today.getMonth(), 1);
    let selectedDate = todayStr;
    let _addTodoCatId = null;

    // Storage
    function loadLocal(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
    function saveLocal(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

    // Categories
    function loadCats() { return loadLocal('__todo_cats__') || []; }
    async function saveCats(cats) {
      saveLocal('__todo_cats__', cats);
      try { await setDoc(doc(db, 'todo_settings', 'categories'), { list: cats }); } catch(e) { console.error(e); }
    }
    async function syncCats() {
      try {
        const snap = await getDoc(doc(db, 'todo_settings', 'categories'));
        if (snap.exists()) saveLocal('__todo_cats__', snap.data().list || []);
      } catch(e) { console.error(e); }
    }

    // Todos - month-based storage
    function monthKey(ds) { return ds.slice(0, 7); } // "2026-05"
    function dayKey(ds) { return ds.slice(8, 10); }  // "01"

    function loadMonthLocal(ym) { return loadLocal(`__todos_month__${ym}`) || {}; }
    function saveMonthLocal(ym, data) { saveLocal(`__todos_month__${ym}`, data); }

    function loadTodos(ds) {
      const month = loadMonthLocal(monthKey(ds));
      return month[dayKey(ds)] || {};
    }
    async function saveTodos(ds, data) {
      const ym = monthKey(ds), dk = dayKey(ds);
      const month = loadMonthLocal(ym);
      month[dk] = data;
      saveMonthLocal(ym, month);
      try {
        const clean = JSON.parse(JSON.stringify(month, (k,v) => v === undefined ? null : v));
        await setDoc(doc(db, 'todos', ym), clean);
      } catch(e) { console.error(e); }
    }
    async function syncTodosForMonth(y, m) {
      const ym = `${y}-${String(m+1).padStart(2,'0')}`;
      try {
        const snap = await getDoc(doc(db, 'todos', ym));
        if (snap.exists()) saveMonthLocal(ym, snap.data());
      } catch(e) { console.error(e); }
    }

    // Helpers
    function getIncomplete(ds) {
      const cats = loadCats(); const todos = loadTodos(ds); let n = 0;
      cats.forEach(c => (todos[c.id]||[]).forEach(i => { if (!i.done) n++; }));
      return n;
    }
    function getTotal(ds) {
      const cats = loadCats(); const todos = loadTodos(ds); let n = 0;
      cats.forEach(c => { n += (todos[c.id]||[]).length; });
      return n;
    }

    // Calendar
    function renderCal() {
      const y = calMonth.getFullYear(), m = calMonth.getMonth();
      document.getElementById('todo-cal-title').innerHTML = `<strong>${MONTHS[m]}</strong> ${y}`;
      const grid = document.getElementById('todo-cal-grid');
      grid.innerHTML = '';
      DAYS_SHORT.forEach(d => {
        const el = document.createElement('div');
        el.className = 'todo-cal-dow'; el.textContent = d; grid.appendChild(el);
      });
      const firstDow = new Date(y, m, 1).getDay();
      for (let i = 0; i < firstDow; i++) {
        const el = document.createElement('div'); el.className = 'todo-cal-cell empty'; grid.appendChild(el);
      }
      const days = new Date(y, m+1, 0).getDate();
      for (let d = 1; d <= days; d++) {
        const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const incomplete = getIncomplete(ds), total = getTotal(ds);
        const allDone = total > 0 && incomplete === 0;
        const cell = document.createElement('div');
        cell.className = 'todo-cal-cell';
        if (ds === todayStr) cell.classList.add('is-today');
        if (ds === selectedDate) cell.classList.add('is-selected');
        if (allDone) cell.classList.add('all-done');

        let dotsHtml = '';
        if (total > 0) {
          const dotCount = Math.min(incomplete, 3);
          const dots = Array(dotCount).fill('<div class="todo-dot"></div>').join('');
          const plus = incomplete > 3 ? '<div class="todo-dot plus">+</div>' : '';
          dotsHtml = `<div class="todo-dot-wrap">${dots}${plus}</div>`;
        }
        cell.innerHTML = `<div class="todo-cal-num">${d}</div>${dotsHtml}`;
        cell.onclick = () => selectDate(ds);
        grid.appendChild(cell);
      }
    }

    function selectDate(ds) { selectedDate = ds; renderCal(); renderList(); }

    window.changeTodoMonth = (dir) => {
      calMonth.setMonth(calMonth.getMonth() + dir);
      syncTodosForMonth(calMonth.getFullYear(), calMonth.getMonth()).then(renderCal);
    };
    window.goToTodayTodo = () => {
      selectedDate = todayStr;
      calMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      renderCal(); renderList();
    };

    // List
    function renderList() {
      const cats = loadCats(), todos = loadTodos(selectedDate);
      const d = new Date(selectedDate);
      document.getElementById('todo-selected-date').textContent =
        `${DAYS_SHORT[d.getDay()]}, ${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}`;
      const container = document.getElementById('todo-cat-list');
      if (cats.length === 0) {
        container.innerHTML = '<p style="font-size:13px;color:#B0B8C1;text-align:center;padding:32px 0;">⚙️ 버튼으로 카테고리를 추가해보세요</p>';
        return;
      }
      container.innerHTML = cats.map(cat => {
        const items = todos[cat.id] || [];
        const itemsHtml = items.length === 0
          ? '<div class="todo-empty">아직 할 일이 없어요</div>'
          : items.map((item, idx) => {
              const isOverdue = item.due && item.due < todayStr && !item.done;
              return `<div class="todo-item">
                <div class="todo-item-check ${item.done?'checked':''}" onclick="toggleTodo('${cat.id}',${idx})">
                  <span class="check-icon" style="${item.done?'display:block':'display:none'}">${CHECK_SVG}</span>
                </div>
                <div class="todo-item-text-wrap">
                  <div class="todo-item-text ${item.done?'done':''}">${item.text}</div>
                  ${item.due?`<div class="todo-item-due ${isOverdue?'overdue':''}">${item.due} (마감일)</div>`:''}
                </div>
                <button class="todo-item-delete" onclick="deleteTodo('${cat.id}',${idx})">✕</button>
              </div>`;
            }).join('');
        return `<div class="todo-category">
          <div class="todo-cat-header">
            <span class="todo-cat-name" style="color:${cat.color}">${cat.name}</span>
            <button class="todo-cat-add" onclick="openAddTodo('${cat.id}')">+</button>
          </div>
          ${itemsHtml}
        </div>`;
      }).join('');
    }

    window.toggleTodo = async (catId, idx) => {
      const todos = loadTodos(selectedDate);
      if (!todos[catId]) return;
      todos[catId][idx].done = !todos[catId][idx].done;
      await saveTodos(selectedDate, todos);
      renderList(); renderCal();
    };
    window.deleteTodo = async (catId, idx) => {
      const todos = loadTodos(selectedDate);
      if (!todos[catId]) return;
      todos[catId].splice(idx, 1);
      await saveTodos(selectedDate, todos);
      renderList(); renderCal();
    };
    window.openAddTodo = (catId) => {
      _addTodoCatId = catId;
      document.getElementById('todo-text-input').value = '';
      document.getElementById('todo-due-input').value = '';
      document.getElementById('add-todo-modal').classList.add('open');
    };
    window.closeAddTodo = () => document.getElementById('add-todo-modal').classList.remove('open');
    window.saveTodoItem = async () => {
      const text = document.getElementById('todo-text-input').value.trim();
      if (!text) return;
      const due = document.getElementById('todo-due-input').value || null;
      const todos = loadTodos(selectedDate);
      if (!todos[_addTodoCatId]) todos[_addTodoCatId] = [];
      todos[_addTodoCatId].push({ text, due, done: false });
      await saveTodos(selectedDate, todos);
      closeAddTodo(); renderList(); renderCal();
    };

    // Category settings
    window.openCatSettings = () => { renderCatSettings(); document.getElementById('cat-settings-modal').classList.add('open'); };
    window.closeCatSettings = () => document.getElementById('cat-settings-modal').classList.remove('open');
    function renderCatSettings() {
      const cats = loadCats();
      document.getElementById('cat-list-settings').innerHTML = cats.length === 0
        ? '<p style="font-size:13px;color:#aaa;text-align:center;padding:12px 0;">카테고리가 없어요</p>'
        : cats.map(c => `<div class="tag-list-item">
            <span class="tag-chip" style="background:${c.color}20;color:${c.color};border-color:${c.color}40">${c.name}</span>
            <div style="display:flex;gap:6px;">
              <button class="tag-action-btn" onclick="editCat('${c.id}')">수정</button>
              <button class="tag-action-btn danger" onclick="deleteCat('${c.id}')">삭제</button>
            </div>
          </div>`).join('');
    }
    window.openAddCat = () => {
      document.getElementById('cat-form-title').textContent = '카테고리 추가';
      document.getElementById('cat-name-input').value = '';
      document.getElementById('cat-edit-id').value = '';
      document.getElementById('cat-selected-color').value = '';
      renderCatPalette(null);
      document.getElementById('cat-form').style.display = '';
    };
    window.editCat = (id) => {
      const cat = loadCats().find(c => c.id === id);
      if (!cat) return;
      document.getElementById('cat-form-title').textContent = '카테고리 수정';
      document.getElementById('cat-name-input').value = cat.name;
      document.getElementById('cat-edit-id').value = id;
      document.getElementById('cat-selected-color').value = cat.color;
      renderCatPalette(cat.color);
      document.getElementById('cat-form').style.display = '';
    };
    window.deleteCat = async (id) => {
      await saveCats(loadCats().filter(c => c.id !== id));
      renderCatSettings(); renderList();
    };
    function renderCatPalette(selected) {
      document.getElementById('cat-color-palette').innerHTML = CAT_PALETTE.map(c =>
        `<div class="color-swatch ${selected===c?'selected':''}" style="background:${c}" onclick="selectCatColor('${c}')"></div>`
      ).join('');
    }
    window.selectCatColor = (color) => {
      document.getElementById('cat-selected-color').value = color;
      renderCatPalette(color);
    };
    window.saveCat = async () => {
      const name = document.getElementById('cat-name-input').value.trim();
      const color = document.getElementById('cat-selected-color').value;
      const editId = document.getElementById('cat-edit-id').value;
      if (!name || !color) { alert('이름과 색상을 모두 선택해주세요.'); return; }
      const cats = loadCats();
      if (editId) { const i = cats.findIndex(c => c.id === editId); if (i > -1) cats[i] = { id: editId, name, color }; }
      else cats.push({ id: Date.now().toString(), name, color });
      await saveCats(cats);
      document.getElementById('cat-form').style.display = 'none';
      renderCatSettings(); renderList();
    };

    // Init
    async function init() {
      await syncCats();
      await syncTodosForMonth(calMonth.getFullYear(), calMonth.getMonth());
      renderCal(); renderList();
    }
    init();
  </script>
</body>
</html>
